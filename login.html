<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalonPro - Giriş Yap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --text: #f1f5f9;
            --text-muted: #cbd5e1;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f35 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f35 100%);
            padding: 20px;
        }

        .login-box {
            background: var(--bg-light);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-box h2 {
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .password-field {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s;
            padding: 5px;
        }

        .password-toggle:hover {
            color: var(--text);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            padding: 0;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-size: 13px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .toggle-text a {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            animation: slideUp 0.3s ease;
            position: fixed;
            bottom: 20px;
            right: 20px;
            max-width: 400px;
            z-index: 2000;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-close {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 16px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>✂️ SalonPro</h2>
            
            <div id="loginFormContainer">
                <h3 style="margin-bottom: 20px; color: var(--text);">Giriş Yap</h3>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="admin@salon.com">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <div class="password-field">
                        <input type="password" id="loginPassword" placeholder="Şifreniz">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPassword')">⊙</button>
                    </div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Beni Hatırla</label>
                </div>
                <button class="btn btn-primary" onclick="login()">Giriş Yap</button>
                <div class="toggle-text">
                    Hesabınız yok mu? <a onclick="toggleAuthForm()">Kayıt Ol</a>
                </div>
            </div>

            <div id="signupFormContainer" style="display: none;">
                <h3 style="margin-bottom: 20px; color: var(--text);">Kayıt Ol</h3>
                <div class="form-group">
                    <label>Salon Adı</label>
                    <input type="text" id="signupSalon" placeholder="Salon Adınız">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="Email Adresiniz">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <div class="password-field">
                        <input type="password" id="signupPassword" placeholder="En az 6 karakter">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signupPassword')">⊙</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Şifre Tekrar</label>
                    <div class="password-field">
                        <input type="password" id="signupPasswordConfirm" placeholder="Şifrenizi tekrar girin">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signupPasswordConfirm')">⊙</button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="signup()">Kayıt Ol</button>
                <div class="toggle-text">
                    Zaten hesabınız var mı? <a onclick="toggleAuthForm()">Giriş Yap</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB204Njob3zyQwCEtqzlysLSl8nlZbqA7k",
            authDomain: "salon-crm-2ef89.firebaseapp.com",
            databaseURL: "https://salon-crm-2ef89-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "salon-crm-2ef89",
            storageBucket: "salon-crm-2ef89.firebasestorage.app",
            messagingSenderId: "32532475239",
            appId: "1:32532475239:web:81d6f34bfab82c919c53c2",
            measurementId: "G-1P6EV84R2L"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const button = event.target;
            
            if (field.type === 'password') {
                field.type = 'text';
                button.textContent = '⊗';
            } else {
                field.type = 'password';
                button.textContent = '⊙';
            }
        }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showAlert('Lütfen tüm alanları doldurun', 'danger');
                return;
            }

            database.ref('users').orderByChild('email').equalTo(email).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    let found = false;
                    snapshot.forEach((child) => {
                        if (child.val().password === password) {
                            found = true;
                            const user = child.val();
                            user.id = child.key;
                            
                            if (rememberMe) {
                                localStorage.setItem('currentUser', JSON.stringify(user));
                                sessionStorage.removeItem('currentUser');
                            } else {
                                sessionStorage.setItem('currentUser', JSON.stringify(user));
                                localStorage.removeItem('currentUser');
                            }
                            
                            window.location.href = 'app.html';
                        }
                    });
                    
                    if (!found) {
                        showAlert('Email veya şifre yanlış', 'danger');
                    }
                } else {
                    showAlert('Email veya şifre yanlış', 'danger');
                }
            });
        }

        function signup() {
            const salon = document.getElementById('signupSalon').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupPasswordConfirm').value;

            if (!salon || !email || !password || !confirm) {
                showAlert('Lütfen tüm alanları doldurun', 'danger');
                return;
            }

            if (password !== confirm) {
                showAlert('Şifreler eşleşmiyor', 'danger');
                return;
            }

            if (password.length < 6) {
                showAlert('Şifre en az 6 karakter olmalı', 'danger');
                return;
            }

            database.ref('users').orderByChild('email').equalTo(email).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    showAlert('Bu email zaten kullanılıyor', 'danger');
                } else {
                    const newUser = {
                        salon,
                        email,
                        password,
                        createdAt: new Date().toISOString(),
                        paymentStatus: 'Ödenmedi',
                        paket: 'BAŞLANGIÇ'
                    };

                    database.ref('users').push(newUser).then(() => {
                        showAlert('Kayıt başarılı! Giriş yapabilirsiniz.', 'success');
                        document.getElementById('signupSalon').value = '';
                        document.getElementById('signupEmail').value = '';
                        document.getElementById('signupPassword').value = '';
                        document.getElementById('signupPasswordConfirm').value = '';
                        setTimeout(() => toggleAuthForm(), 1500);
                    }).catch((error) => {
                        showAlert('Hata: ' + error.message, 'danger');
                    });
                }
            });
        }

        function toggleAuthForm() {
            const loginForm = document.getElementById('loginFormContainer');
            const signupForm = document.getElementById('signupFormContainer');
            loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
            signupForm.style.display = signupForm.style.display === 'none' ? 'block' : 'none';
        }

        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                ${message}
                <button class="alert-close" onclick="this.parentElement.remove()">×</button>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 4000);
        }
    </script>
</body>
</html>
